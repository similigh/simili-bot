name: Simili Issue & PR Triage

on:
  issues:
    types: [opened, edited, reopened]
  pull_request:
    types: [opened, edited, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
      id-token: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - uses: similigh/simili-bot@main
        id: simili
        with:
          config_path: .github/simili.yaml
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}

      # Claude Code — runs only when @simili-bot is triggered (optional)
      - uses: anthropics/claude-code-action@v1
        if: steps.simili.outputs.claude_code_triggered == 'true'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@simili-bot"
          claude_args: ${{ steps.simili.outputs.claude_code_model_override && format('--model {0}', steps.simili.outputs.claude_code_model_override) || '' }}
